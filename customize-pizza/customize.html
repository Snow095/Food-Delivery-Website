<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customise Pizza</title>
    <link rel="stylesheet" href="./customize.css">
</head>
<body>
    <section class="bg"></section>
    <section class="customize">
        <div class="cuspizza">
            <h3>Special Offers <img src="../home/images/Back.png" alt=""> Meal Deal 1<img src="../home/images/Back.png" alt=""> Customise Pizza 1</h3>
            <div class="sele-cuspizza">
                <p style="font-size: 32px; margin-left: 25px; line-height: 40px;">Customise your chicken Pizza</p>
                <h4 style="font-size: 24px; color: #03081F; padding-right: 40px;">4/4 Selected</h4>
            </div>
        </div>
        <div class="sel-op">
            <img src="../home/images/Polo.png" alt="">
            <div class="pizzamenText">
                <h4 style="font-size: 44px; line-height: 58px; margin-left: 15px; color: #FC8A06; text-align: center;">Please select up to 4 options free!</h4>
            </div>
        </div>
        <div class="check-boxPiz">
            <div class="veg-car">
                <div class="veg-top"><h3>Vegitable Toppings</h3></div>
                <div class="carrot"><img src="../home/images/Carrot.png" alt=""></div>
                <div class="checkbox">
                    <div class="checkbox1">
                        <form action="">
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="cheese" checked style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Cheese</label>
                            </div>
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="mushroom" style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Mushrooms</label>
                            </div>
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="olives" style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Olives</label>
                            </div>
                        </form>
                    </div>
                    <div class="checkbox1">
                        <form action="">
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Green peppers" style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Green peppers</label>
                            </div>
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Sweetcorns" style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Sweetcorns</label>
                            </div>
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Pineapples" style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Pineapples</label>
                            </div>
                        </form>
                    </div>
                    <div class="checkbox1">
                        <form action="">
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Tomato"  style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Tomato</label>
                            </div>
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Jalapeneos" style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Jalapeneos</label>
                            </div>
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="olives" checked style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Onions</label>
                            </div>
                        </form>
                    </div>
                    
                </div>
                
            </div>
            
        </div>
        <div class="check-boxPiz2">
            <div class="veg-car">
                <div class="veg-top"><h3>Meat Toppings</h3></div>
                <div class="carrot"><img src="../home/images/Meat.png" alt=""></div>
                <div class="checkbox">
                    <div class="checkbox2">
                        <form action="">
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Chicken" style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Chicken</label>
                            </div>
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Pepperoni" style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Pepperoni</label>
                            </div>
                        </form>
                    </div>
                    <div class="checkbox2">
                        <form action="">
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Beef" style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Beef</label>
                            </div>
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Chicken Tikka" checked style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Chicken Tikka</label>
                            </div>
                        </form>
                    </div>
                    <div class="checkbox2">
                        <form action="">
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Salami"  style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Salami</label>
                            </div>
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Fish" style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Fish</label>
                            </div>
                        </form>
                    </div>
                    
                </div>
                
            </div>
            
        </div>
        <div class="check-boxPiz3">
            <div class="veg-car">
                <div class="veg-top"><h3>Seafood Toppings</h3></div>
                <div class="carrot"><img src="../home/images/Whole Fish.png" alt=""></div>
                <div class="checkbox">
                    <div class="checkbox3">
                        <form action="">
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Tuna" checked style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Tuna</label>
                            </div>
                        </form>
                    </div>
                    <div class="checkbox3">
                        <form action="">
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Anchovies" style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Anchovies</label>
                            </div>
                        </form>
                    </div>
                    <div class="checkbox3">
                        <form action="">
                            <div class="check1">
                                <input type="checkbox" name="veggies" id="veggie1" value="Prawns"  style="height: 60px; width: 60px;border-radius: 12px;border: 20px solid #D8D8D8;">
                                <label for="veggie1">Prawns</label>
                            </div>
                        </form>
                    </div>
                    
                </div>
                
            </div>
            
        </div>
        <div class="tot-del">
            <div class="total-pay"><h4>Total to pay</h4><p>£127.90</p></div>
            <p style="font-size: 17px;line-height: 25px; align-items: center;">Delivery & Tax will be calculated in the next step</p>
        </div>
        <div class="take-back">
            <a href="../mealdeal/mealdeal.html"><h4 style="text-decoration: solid black underline; font-size: 24px; color: black;">Take me back</h4></a>
            <div class="next">
                <img src="../home/images/Forward Button (1).png" alt="">
                <a href="../add-request/add-request.html"><p style="text-decoration: solid white underline; color: white;">Next Step</p></a>
            </div>
        </div>
    </section>
</body>
</html>
